<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Consumir API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>

  <h1>Post desde API</h1>
  <div id="post" class="card">Cargando...</div>

  <script>
    fetch('https://jsonplaceholder.typicode.com/posts/4')
      .then(response => response.json())
      .then(data => {
        document.getElementById('post').innerHTML = `
          <h2>${data.title}</h2>
          <p>${data.body}</p>
        `;
      })
      .catch(error => {
        document.getElementById('post').innerHTML = "Error al cargar datos";
        console.error(error);
      });
  </script>

</body>
</html>
